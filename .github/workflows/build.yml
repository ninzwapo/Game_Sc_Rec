name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false
      - name: Clean pub cache
        run: flutter pub cache repair
      - name: Install dependencies
        run: flutter pub get
      - name: Create default launcher icons
        run: |
          FLUTTER_ROOT=$(flutter --version --machine | python3 -c "import sys,json; print(json.load(sys.stdin)['flutterRoot'])")
          DEFAULT_ICON="$FLUTTER_ROOT/packages/flutter_tools/templates/app/android.tmpl/app/src/main/res"
          cp -r "$DEFAULT_ICON"/mipmap-hdpi android/app/src/main/res/
          cp -r "$DEFAULT_ICON"/mipmap-mdpi android/app/src/main/res/
          cp -r "$DEFAULT_ICON"/mipmap-xhdpi android/app/src/main/res/
          cp -r "$DEFAULT_ICON"/mipmap-xxhdpi android/app/src/main/res/
          cp -r "$DEFAULT_ICON"/mipmap-xxxhdpi android/app/src/main/res/
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-recorder-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
