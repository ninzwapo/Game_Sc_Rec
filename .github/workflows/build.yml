name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false
      - name: Clean pub cache
        run: flutter pub cache repair
      - name: Install dependencies
        run: flutter pub get
      - name: Create default launcher icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert -size 48x48 xc:#2196F3 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72 xc:#2196F3 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96 xc:#2196F3 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:#2196F3 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:#2196F3 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-recorder-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
