name: game_recorder
description: Record 10s of screen then place pattern lines A-D on playback.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_screen_recording: ^2.0.19    
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  flutter_overlay_window: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true