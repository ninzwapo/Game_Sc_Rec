name: screen_recorder
description: 10-second screen recorder using Android MediaProjection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_screen_recording: ^2.0.22
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

dependency_overrides:
  flutter_foreground_task: ^8.17.0

flutter:
  uses-material-design: true
